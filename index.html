<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>City Intelligence Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>City Intelligence Agent</h1>
            <p>Ask me about weather and news</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- Messages will appear here -->
        </div>

        <div class="chat-input-container">
            <input
                type="text"
                id="messageInput"
                placeholder="Type your message..."
                autocomplete="off"
            >
            <button id="sendButton">Send</button>
        </div>
    </div>

    <!-- Approval Modal (hidden by default) -->
    <div id="approvalModal" class="approval-modal">
        <div class="approval-content">
            <h3>Tool Approval Required</h3>
            <p id="approvalMessage">Agent wants to use a tool</p>
            <div class="approval-buttons">
                <button id="approveBtn" class="approve-btn">Approve</button>
                <button id="denyBtn" class="deny-btn">Deny</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
